<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cihangir Akman — Mobile Apps</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 640px; margin: 0 auto; padding: 56px 24px; line-height: 1.6;
    color: #1a1a1a; background: #fafafa;
  }
  h1 { font-size: 28px; margin: 0 0 4px; }
  .tag { color: #6a6a6a; margin: 0 0 36px; }
  .card {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid #e4e4e4; border-radius: 16px; padding: 20px 22px;
    margin-bottom: 16px; background: #fff; transition: border-color .15s, transform .1s;
  }
  .card:hover { border-color: #b9b9b9; transform: translateY(-1px); }
  .card h2 { font-size: 18px; margin: 0 0 4px; }
  .card p { margin: 0; color: #6a6a6a; font-size: 14px; }
  .links { margin-top: 28px; font-size: 14px; }
  a { color: #0a66c2; }
  footer { margin-top: 40px; color: #9a9a9a; font-size: 13px; }
  @media (prefers-color-scheme: dark) {
    body { color: #ededed; background: #0f0f0f; }
    .card { background: #1a1a1a; border-color: #2c2c2c; }
    .card:hover { border-color: #4a4a4a; }
    .card p, .tag { color: #a0a0a0; }
    a { color: #4aa3ff; }
  }
</style>
</head>

  <p class="tag">Independent mobile game &amp; app developer</p>
